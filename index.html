<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>John Doe - Personal Website</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
            overflow: hidden;
            animation: slideIn 0.8s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .profile-image {
            width: 100%;
            height: 250px;
            object-fit: cover;
            display: block;
        }

        .profile-info {
            padding: 40px 30px 30px;
            text-align: center;
        }

        .name {
            font-size: 2.5em;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .description {
            font-size: 1.2em;
            color: #7f8c8d;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .hobbies {
            text-align: left;
        }

        .hobbies h3 {
            font-size: 1.4em;
            color: #2c3e50;
            margin-bottom: 20px;
            text-align: center;
        }

        .hobby-list {
            list-style: none;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 0 20px;
        }

        .hobby-item {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            padding: 15px 20px;
            border-radius: 25px;
            text-align: center;
            font-weight: 500;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }

        .hobby-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        @media (max-width: 480px) {
            .hobby-list {
                grid-template-columns: 1fr;
                padding: 0 10px;
            }
            
            .name {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Profile Image -->
        <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=500&h=250&fit=crop&crop=face" 
             alt="Profile Picture" class="profile-image">
        
        <!-- Profile Information -->
        <div class="profile-info">
            <h1 class="name">Nishan Valu</h1>
            <p class="description">
                I am an software engineer and I love coding and experimenting new stuffs and I have many friends.
             
            </p>
            
            <!-- Hobbies Section -->
            <div class="hobbies">
                <h3>My Hobbies</h3>
                <ul class="hobby-list">
                    
                    <li class="hobby-item">🏃‍♂️ Running</li>
                    <li class="hobby-item">📚 Reading</li>
                    <li class="hobby-item">☕ Coffee Brewing</li>
                    <li class="hobby-item">✈️ Traveling</li>
                    <li class="hobby-item">🎮 Gaming</li>
                </ul>
            </div>
        </div>
    </div>
</body>
</html>
